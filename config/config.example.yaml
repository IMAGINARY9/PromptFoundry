# PromptFoundry Configuration Example
# Copy this file to config.yaml and customize

# =============================================================================
# Optimization Settings
# =============================================================================
optimization:
  # Runtime profile: slow-local, balanced, or throughput
  # Profiles provide sensible defaults for different deployment scenarios.
  # Individual settings below will override profile defaults.
  profile: slow-local
  
  strategy: evolutionary
  max_generations: 50
  population_size: 4  # reasonable when LLM is slow
  patience: 10
  max_concurrency: 1  # text-generation-webui is often effectively single-worker
  runtime_budget: 0   # Maximum runtime in seconds (0 for unlimited)
  seed: null  # Set for reproducibility

# =============================================================================
# Evolutionary Strategy Settings
# =============================================================================
strategy:
  evolutionary:
    mutation_rate: 0.3
    crossover_rate: 0.7
    tournament_size: 3
    elitism: 2
    adaptive_mutation_weights: true
    min_operator_weight: 0.4
    weight_learning_rate: 0.8
    use_semantic_mutations: true
    use_diversity_control: true
    use_adaptive_schedule: true
    schedule_type: operator
    enable_ablation_tracking: true
    min_diversity_ratio: 0.7
    crowding_penalty: 0.1

# =============================================================================
# LLM Settings (Local text-generation-webui)
# =============================================================================
llm:
  provider: openai_compat
  base_url: http://127.0.0.1:5000/v1
  api_key: local
  model: Mistral-7B/mistral-7b-instruct-v0.2.Q4_K_M.gguf
  temperature: 0.7
  max_tokens: 256
  # Optional provider-specific payload fields forwarded to the backend.
  # Example for reasoning-capable local models:
  # extra:
  #   chat_template_kwargs:
  #     enable_thinking: false
  timeout: 30
  max_retries: 3

# =============================================================================
# Evaluation Settings
# =============================================================================
evaluation:
  type: exact_match
  case_sensitive: false
  strip_whitespace: true

# =============================================================================
# Output Settings
# =============================================================================
output:
  directory: ./output
  save_history: true
  format: json

# =============================================================================
# Logging Settings
# =============================================================================
logging:
  level: INFO
  format: text
